global:
  scrape_interval:     15s # Default is every 1 minute.

scrape_configs:
  - job_name: 'prometheus'

    static_configs:
      - targets: ['localhost:8080']

  - job_name: 'spring-actuator'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['localhost:8080'] # refer system ip address rather that localhost
